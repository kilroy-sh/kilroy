<svg width="32" height="32" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <rect width="32" height="32" rx="7" fill="#C8642A"/>
  <!-- dome -->
  <path d="M10 19 C10 10, 22 10, 22 19" stroke="#FAF6F1" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- antenna stem -->
  <line x1="16" y1="10" x2="16" y2="6" stroke="#FAF6F1" stroke-width="1.2" stroke-linecap="round"/>
  <!-- antenna tip -->
  <circle cx="16" cy="5" r="1.5" fill="#FAF6F1"/>
  <!-- left eye -->
  <circle cx="14" cy="16.5" r="1.5" fill="#FAF6F1"/>
  <!-- right eye -->
  <circle cx="18" cy="16.5" r="1.5" fill="#FAF6F1"/>
  <!-- wall -->
  <line x1="4" y1="20" x2="28" y2="20" stroke="#FAF6F1" stroke-width="1.5" stroke-linecap="round"/>
  <!-- nose / wall peek -->
  <path d="M16 19 C16 21, 15.8 23, 16 26" stroke="#FAF6F1" stroke-width="1.2" fill="none" stroke-linecap="round"/>
</svg>
